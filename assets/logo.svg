<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 背景方块 -->
  <rect x="2" y="2" width="116" height="116" rx="24" ry="24" fill="url(#bg)"/>
  <rect x="2" y="2" width="116" height="116" rx="24" ry="24" fill="url(#shine)"/>
  <!-- JY 文字 - 精确居中 -->
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-weight="800" font-size="54" fill="white" letter-spacing="-1">JY</text>
</svg>
